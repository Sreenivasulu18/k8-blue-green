apiVersion: apps/v1
kind: Deployment 
metadata: 
  name: nginx-blue 
  labels:
    purpose: blue-green
    project: roboshop
    color: blue
spec:
  replicas: 4
  selector: 
    matchLabels: 
      purpose: blue-green
      project: roboshop 
      color: blue 
  template:
    metadata: 
      labels:
        purpose: blue-green
        project: roboshop
        color: blue
    spec:
      containers:
      - name: nginx 
        image: nginx:latest